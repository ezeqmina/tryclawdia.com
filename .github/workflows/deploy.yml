name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 137.184.218.9
          username: webadmin
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          source: "index.html"
          target: "/var/www/html/"

      - name: Verify deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 137.184.218.9
          username: webadmin
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            echo "Deployed at $(date)"
            ls -lh /var/www/html/index.html
